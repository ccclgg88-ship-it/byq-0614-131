<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>魅魔养成 - Succubus Raising</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 1280px;
      height: 720px;
      box-shadow: 0 0 40px rgba(155, 89, 182, 0.4);
      border-radius: 8px;
      overflow: hidden;
    }
    #game-canvas {
      display: block;
      background: linear-gradient(180deg, #2c1e4a 0%, #1a1a2e 100%);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="1280" height="720"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
