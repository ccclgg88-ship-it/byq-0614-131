version: '3.8'

services:
  succubus-game:
    build: .
    container_name: succubus-raising-game
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
